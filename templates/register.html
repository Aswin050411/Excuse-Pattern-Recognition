{% extends "base.html" %}

{% block title %}Neural_Access — EXCUSE_AI{% endblock %}

{% block extra_head %}
<style>
    :root {
        --neural-cyan: #39d3f2;
        --neural-cyan-dim: rgba(57, 211, 242, 0.08);
        --login-bg: #03070a;
        --panel-bg: #080c10;
        --accent-purple: #6366f1;
    }

    .auth-container {
        min-height: 100vh;
        background: var(--login-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
        font-family: 'Geist', var(--font-sans), sans-serif;
    }

    /* Ambient background grid */
    .auth-container::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(57, 211, 242, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(57, 211, 242, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        pointer-events: none;
    }

    .auth-card {
        width: 100%;
        max-width: 480px;
        background: var(--panel-bg);
        border: 1px solid rgba(57, 211, 242, 0.15);
        border-radius: 24px;
        padding: 40px;
        position: relative;
        z-index: 10;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
        animation: cardRise 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardRise {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .auth-title {
        font-size: 28px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: #ffffff;
        margin-bottom: 32px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    /* Form Components */
    .form-group {
        margin-bottom: 24px;
    }

    .neural-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .neural-input-wrap {
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    .neural-input-wrap:focus-within {
        background: rgba(57, 211, 242, 0.04);
        border-color: rgba(57, 211, 242, 0.4);
        box-shadow: 0 0 20px rgba(57, 211, 242, 0.05);
    }

    .neural-input,
    .neural-select {
        width: 100%;
        background: transparent;
        border: none;
        padding: 14px 16px;
        color: #fff;
        font-size: 14px;
        outline: none;
    }

    .neural-select {
        appearance: none;
        cursor: pointer;
    }

    .neural-select option {
        background: #0d1117;
        color: #fff;
    }

    /* Standardized Neural Toggle */
    .neural-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid rgba(57, 211, 242, 0.2);
        background: rgba(57, 211, 242, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .neural-core {
        position: absolute;
        width: 4px;
        height: 4px;
        background: var(--neural-cyan);
        border-radius: 50%;
        opacity: 0;
        box-shadow: 0 0 10px var(--neural-cyan);
    }

    .neural-toggle.active .neural-core {
        opacity: 1;
        animation: corePulse 1.5s infinite;
    }

    @keyframes corePulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.8;
        }

        50% {
            transform: scale(1.5);
            opacity: 1;
        }
    }

    /* Primary Action Button */
    .btn-neural-primary {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
        border: none;
        border-radius: 14px;
        color: #fff;
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        margin-top: 10px;
    }

    .btn-neural-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 50px rgba(99, 102, 241, 0.5);
        filter: brightness(1.1);
    }

    .auth-footer {
        margin-top: 32px;
        text-align: center;
        font-size: 14px;
        color: #ffffff;
    }

    .auth-link {
        color: var(--neural-cyan);
        text-decoration: none;
        font-weight: 600;
        margin-left: 6px;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        color: #ffffff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        text-decoration: none;
        margin-top: 24px;
        padding: 6px 12px;
        border: 1px solid rgba(57, 211, 242, 0.2);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .back-link:hover {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.15);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="margin-bottom: 32px;">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">// join the behavioral network</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 24px;">
                <!-- Profile Photo -->
                <div class="form-group" style="grid-column: 1 / -1; margin-bottom: 32px;">
                    <label class="neural-label">
                        <i data-lucide="camera" style="width: 14px; height: 14px; color: var(--neural-cyan);"></i>
                        Profile Visualizer
                    </label>
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
                        <div id="avatar-preview"
                            style="width: 80px; height: 80px; border-radius: 50%; background: var(--neural-cyan-dim); border: 2px dashed rgba(57, 211, 242, 0.3); display: flex; align-items: center; justify-content: center; overflow: hidden;">
                            <i data-lucide="user"
                                style="width: 32px; height: 32px; color: rgba(57, 211, 242, 0.4);"></i>
                        </div>
                        <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display: none;"
                            onchange="previewImage(this)">
                        <button type="button" class="back-link" style="margin-top: 0; cursor: pointer;"
                            onclick="document.getElementById('avatar-input').click()">
                            <i data-lucide="upload" style="width: 12px; height: 12px;"></i>
                            Upload Identity Photo
                        </button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="user" style="width: 14px;"></i> Full Name</label>
                        <div class="neural-input-wrap">
                            <input type="text" name="full_name" class="neural-input" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="phone" style="width: 14px;"></i> Phone</label>
                        <div class="neural-input-wrap">
                            <input type="text" name="phone" class="neural-input" placeholder="+1..." required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="neural-label"><i data-lucide="mail" style="width: 14px;"></i> Communication
                        Node</label>
                    <div class="neural-input-wrap">
                        <input type="email" name="email" class="neural-input" placeholder="identity@network.io"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="neural-label"><i data-lucide="lock" style="width: 14px;"></i> Access Sequence</label>
                    <div class="neural-input-wrap">
                        <input type="password" id="password" name="password" class="neural-input" placeholder="••••••••"
                            minlength="8" required>
                        <button type="button" class="neural-toggle" onclick="togglePasswordVisibility()">
                            <span class="neural-core"></span>
                            <i id="eye-icon" data-lucide="scan-eye"
                                style="width: 16px; color: var(--neural-cyan); z-index: 2;"></i>
                        </button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="shield" style="width: 14px;"></i> Network
                            Role</label>
                        <div class="neural-input-wrap">
                            <select name="role" class="neural-select">
                                <option value="employee">Employee</option>
                                <option value="manager">Manager</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="briefcase" style="width: 14px;"></i> Job
                            Title</label>
                        <div class="neural-input-wrap">
                            <input type="text" name="job_role" class="neural-input" placeholder="e.g. Analyst">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="neural-label"><i data-lucide="info" style="width: 14px;"></i> Neural Bio</label>
                    <div class="neural-input-wrap">
                        <textarea name="bio" class="neural-input"
                            placeholder="Briefly describe your cognitive specialty..." rows="2"
                            style="resize: none;"></textarea>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="globe" style="width: 14px;"></i> Country</label>
                        <div class="neural-input-wrap">
                            <input type="text" name="country" class="neural-input" placeholder="United Kingdom">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="neural-label"><i data-lucide="map-pin" style="width: 14px;"></i> City</label>
                        <div class="neural-input-wrap">
                            <input type="text" name="city" class="neural-input" placeholder="London">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="neural-label"><i data-lucide="hash" style="width: 14px;"></i> Postal Code</label>
                    <div class="neural-input-wrap">
                        <input type="text" name="postal_code" class="neural-input" placeholder="SW1A 1AA">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-neural-primary">INITIALIZE IDENTITY →</button>
        </form>

        <div class="auth-footer">
            Already registered? <a href="{{ url_for('auth.login') }}" class="auth-link">Authenticate</a>

            <div style="margin-top: 24px;">
                <a href="{{ url_for('common.index') }}" class="back-link">
                    <i data-lucide="arrow-left" style="width: 12px; height: 12px; margin-right: 4px;"></i>
                    // HOME
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Lucide icons
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    function previewImage(input) {
        const preview = document.getElementById('avatar-preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.neural-toggle');
        const eyeIcon = document.getElementById('eye-icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.classList.add('active');
            eyeIcon.setAttribute('data-lucide', 'scan-eye');
        } else {
            passwordInput.type = 'password';
            toggleBtn.classList.remove('active');
            eyeIcon.setAttribute('data-lucide', 'eye');
        }

        if (typeof lucide !== 'undefined') lucide.createIcons();
    }
</script>

{% endblock %}
